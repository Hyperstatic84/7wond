<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7 Wonders Architects – Répartition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111318;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #D4AF37;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Player rows */
    #playerList {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-num {
      width: 28px;
      height: 28px;
      background: #111318;
      border: 1px solid #D4AF37;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .player-row input {
      flex: 1;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-row input:focus { border-color: #D4AF37; }

    .btn-icon {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
    }

    .btn-icon:hover:not(:disabled) { color: #ef4444; background: #ef444415; }
    .btn-icon:disabled { opacity: 0.2; cursor: default; }

    .btn-add {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px dashed #2a2d3e;
      border-radius: 10px;
      color: #64748b;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-add:hover:not(:disabled) { border-color: #D4AF37; color: #D4AF37; }
    .btn-add:disabled { opacity: 0.3; cursor: default; }

    /* Options */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: #111318;
      border-radius: 10px;
      margin-bottom: 0.6rem;
    }

    .option-label { font-size: 0.82rem; }
    .option-sub   { font-size: 0.7rem; color: #64748b; margin-top: 0.1rem; }

    /* Toggle switch */
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #2a2d3e;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #94a3b8;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #8B6508; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #D4AF37; }

    /* Main CTA */
    .btn-main {
      width: 100%;
      max-width: 520px;
      padding: 1rem;
      background: linear-gradient(135deg, #8B6508, #D4AF37);
      border: none;
      border-radius: 14px;
      color: #111318;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 2rem;
    }

    .btn-main:hover  { opacity: 0.92; }
    .btn-main:active { transform: scale(0.98); }

    /* Results */
    #results { width: 100%; max-width: 520px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .results-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn-secondary {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: #D4AF37; color: #D4AF37; }

    #resultCards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .result-card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wonder-emoji {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      background: #111318;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #2a2d3e;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-player {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }

    .result-wonder {
      font-size: 1rem;
      font-weight: 800;
      color: #D4AF37;
      margin-bottom: 0.3rem;
    }

    .result-power {
      font-size: 0.72rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Error */
    .error {
      background: #1f0b0b;
      border: 1px solid #ef444440;
      color: #fca5a5;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      max-width: 520px;
      width: 100%;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <h1>7 WONDERS ARCHITECTS</h1>
  <p class="subtitle">Répartition des Merveilles</p>

  <!-- Players -->
  <div class="card">
    <h2>
      👥 Joueurs
      <button onclick="fillAntiquNames()" style="margin-left:auto;font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:none;background:#111318;border:1px solid #2a2d3e;border-radius:8px;color:#94a3b8;padding:0.25rem 0.6rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='#D4AF37';this.style.color='#D4AF37'" onmouseout="this.style.borderColor='#2a2d3e';this.style.color='#94a3b8'">
        ✨ Noms antiques
      </button>
    </h2>
    <div id="playerList"></div>
    <button class="btn-add" id="addBtn" onclick="addPlayer()">+ Ajouter un joueur</button>
  </div>

  <!-- Options -->
  <div class="card">
    <h2>⚙️ Options</h2>

    <div class="option-row">
      <div>
        <div class="option-label">Extension "Médailles"</div>
        <div class="option-sub">Ajoute Rome &amp; Ur → 9 merveilles disponibles</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="optMedals" onchange="onOptionChange()" />
        <span class="toggle-slider"></span>
      </label>
    </div>

  </div>

  <div id="errorBox" class="error hidden"></div>

  <button class="btn-main" onclick="distribute()">🎲 Lancer la Répartition</button>

  <!-- Results -->
  <div id="results" class="hidden">
    <div class="results-header">
      <span class="results-title">✨ Merveilles Attribuées</span>
      <button class="btn-secondary" onclick="distribute()">↺ Relancer</button>
    </div>
    <div id="resultCards"></div>
  </div>

  <script>
    const WONDERS = [
      { name: 'Gizeh',        emoji: '🔺', power: 'Pas de pouvoir spécial, mais rapporte 8 points de victoire à son étape finale.' },
      { name: 'Alexandrie',   emoji: '💡', power: 'Piochez la 1ère carte d\'une pioche de votre choix (gauche, droite ou centre).' },
      { name: 'Éphèse',       emoji: '🏛️', power: 'Prenez gratuitement la 1ère carte de la pioche centrale.' },
      { name: 'Olympie',      emoji: '⚡', power: 'Prenez gratuitement un jeton Progrès parmi les trois disponibles.' },
      { name: 'Babylone',     emoji: '🌿', power: 'Choisissez un symbole scientifique de votre choix lors du décompte final.' },
      { name: 'Rhodes',       emoji: '⚔️', power: 'Ajoutez définitivement 1 Bouclier à votre force militaire.' },
      { name: 'Halicarnasse', emoji: '🦁', power: 'Fouillez la défausse et jouez une carte gratuitement.' },
    ];

    const MEDALS = [
      { name: 'Rome', emoji: '🏟️', power: 'Piochez 3 jetons Progrès cachés et gardez-en un. Bonus pour les cartes militaires spéciales.' },
      { name: 'Ur',   emoji: '🌀', power: 'Obtenez le jeton Progrès Urbanisme (si dispo) ou des jetons de commerce exclusifs.' },
    ];

    const ANTIQUE_NAMES = [
      'Jules César', 'Cléopâtre', 'Périclès', 'Nabuchodonosor', 'Alexandre',
      'Artémise', 'Hammurabi', 'Sémiramis', 'Khéops', 'Phidias',
      'Hérodote', 'Ptolémée', 'Néron', 'Ramsès II', 'Xerxès',
      'Hannibal', 'Scipion', 'Darius', 'Cyrus', 'Nefertiti'
    ];

    let players = ['Joueur 1', 'Joueur 2', 'Joueur 3'];

    function pool() {
      return document.getElementById('optMedals').checked ? [...WONDERS, ...MEDALS] : [...WONDERS];
    }

    function maxAllowed() {
      return pool().length;
    }

    function fillAntiquNames() {
      const shuffled = [...ANTIQUE_NAMES].sort(() => Math.random() - 0.5);
      players = players.map((_, i) => shuffled[i]);
      render();
    }

    function render() {
      const list = document.getElementById('playerList');
      list.innerHTML = '';
      players.forEach((name, i) => {
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
          <div class="player-num">${i + 1}</div>
          <input type="text" value="${name}" placeholder="Nom du joueur"
            oninput="players[${i}] = this.value" />
          <button class="btn-icon" onclick="removePlayer(${i})"
            ${players.length <= 2 ? 'disabled' : ''} title="Supprimer">✕</button>`;
        list.appendChild(row);
      });

      const max = maxAllowed();
      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = players.length >= max;
      addBtn.textContent = players.length >= max
        ? `Maximum atteint (${max} joueurs)`
        : '+ Ajouter un joueur';
    }

    function addPlayer() {
      if (players.length < maxAllowed()) {
        players.push(`Joueur ${players.length + 1}`);
        render();
      }
    }

    function removePlayer(i) {
      if (players.length > 2) {
        players.splice(i, 1);
        render();
      }
    }

    function onOptionChange() {
      while (players.length > maxAllowed()) players.pop();
      render();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('errorBox').classList.add('hidden');
    }

    function distribute() {
      hideError();
      const p = pool();

      if (p.length < players.length) {
        showError(`Pas assez de merveilles disponibles (${p.length}) pour ${players.length} joueurs. Activez l'extension Médailles ou réduisez le nombre de joueurs.`);
        return;
      }

      const drawn = shuffle(p);
      const cards = document.getElementById('resultCards');
      cards.innerHTML = '';

      players.forEach((name, i) => {
        const playerName = name.trim() || `Joueur ${i + 1}`;
        const w = drawn[i];
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
          <div class="wonder-emoji">${w.emoji}</div>
          <div class="result-info">
            <div class="result-player">${playerName}</div>
            <div class="result-wonder">${w.name}</div>
            <div class="result-power">${w.power}</div>
          </div>`;
        cards.appendChild(card);
      });

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    render();
  </script>
</body>
</html>
