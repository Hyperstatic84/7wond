<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7 Wonders Architects – Répartition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111318;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #D4AF37;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Player rows */
    #playerList {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-num {
      width: 28px;
      height: 28px;
      background: #111318;
      border: 1px solid #D4AF37;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .player-row input {
      flex: 1;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-row input:focus { border-color: #D4AF37; }

    .btn-icon {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
    }

    .btn-icon:hover:not(:disabled) { color: #ef4444; background: #ef444415; }
    .btn-icon:disabled { opacity: 0.2; cursor: default; }

    .btn-add {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px dashed #2a2d3e;
      border-radius: 10px;
      color: #64748b;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-add:hover:not(:disabled) { border-color: #D4AF37; color: #D4AF37; }
    .btn-add:disabled { opacity: 0.3; cursor: default; }

    /* Options */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: #111318;
      border-radius: 10px;
      margin-bottom: 0.6rem;
    }

    .option-label { font-size: 0.82rem; }
    .option-sub   { font-size: 0.7rem; color: #64748b; margin-top: 0.1rem; }

    /* Toggle switch */
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #2a2d3e;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #94a3b8;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #8B6508; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #D4AF37; }

    /* Main CTA */
    .btn-main {
      width: 100%;
      max-width: 520px;
      padding: 1rem;
      background: linear-gradient(135deg, #8B6508, #D4AF37);
      border: none;
      border-radius: 14px;
      color: #111318;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 2rem;
    }

    .btn-main:hover  { opacity: 0.92; }
    .btn-main:active { transform: scale(0.98); }

    /* Results */
    #results { width: 100%; max-width: 520px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .results-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn-secondary {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: #D4AF37; color: #D4AF37; }

    #resultCards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .result-card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wonder-emoji {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      background: #111318;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #2a2d3e;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-player {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }

    .result-wonder {
      font-size: 1rem;
      font-weight: 800;
      color: #D4AF37;
      margin-bottom: 0.3rem;
    }

    .result-power {
      font-size: 0.72rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Error */
    .error {
      background: #1f0b0b;
      border: 1px solid #ef444440;
      color: #fca5a5;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      max-width: 520px;
      width: 100%;
    }

    .hidden { display: none !important; }

    /* ── Music Player ── */
    .player-card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .player-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #D4AF37;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot-pulse {
      width: 7px; height: 7px;
      background: #D4AF37;
      border-radius: 50%;
    }
    .dot-pulse.active { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* Equalizer bars */
    .eq {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }
    .eq span {
      display: block;
      width: 3px;
      background: #D4AF37;
      border-radius: 2px;
      height: 3px;
      transition: height 0.1s;
    }
    .eq.active span:nth-child(1) { animation: bar 1.1s 0.0s ease-in-out infinite alternate; }
    .eq.active span:nth-child(2) { animation: bar 1.1s 0.3s ease-in-out infinite alternate; }
    .eq.active span:nth-child(3) { animation: bar 1.1s 0.15s ease-in-out infinite alternate; }
    .eq.active span:nth-child(4) { animation: bar 1.1s 0.45s ease-in-out infinite alternate; }
    .eq.active span:nth-child(5) { animation: bar 1.1s 0.25s ease-in-out infinite alternate; }
    @keyframes bar {
      from { height: 3px; }
      to   { height: 18px; }
    }

    .player-body {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.9rem;
    }

    .track-emoji {
      font-size: 1.6rem;
      width: 42px; height: 42px;
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 0.85rem; font-weight: 700; color: #e2e8f0; }
    .track-sub  { font-size: 0.68rem; color: #64748b; margin-top: 0.1rem; }

    .play-btn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #8B6508, #D4AF37);
      border: none; border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    .play-btn:hover  { opacity: 0.88; }
    .play-btn:active { transform: scale(0.93); }

    .theme-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .theme-btn {
      flex: 1;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 9px;
      color: #64748b;
      font-size: 0.72rem;
      padding: 0.4rem 0.3rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: center;
    }
    .theme-btn:hover        { border-color: #D4AF3770; color: #D4AF37; }
    .theme-btn.active-theme { border-color: #D4AF37; color: #D4AF37; background: #D4AF3712; }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .vol-icon { font-size: 0.9rem; color: #475569; flex-shrink: 0; }
    input[type=range].vol {
      flex: 1;
      accent-color: #D4AF37;
      height: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>7 WONDERS ARCHITECTS</h1>
  <p class="subtitle">Répartition des Merveilles</p>

  <!-- Music Player -->
  <div class="player-card">
    <div class="player-top">
      <div class="player-label">
        <div class="dot-pulse" id="dot"></div>
        Ambiance Sonore
      </div>
      <div class="eq" id="eq">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="player-body">
      <div class="track-emoji" id="trackEmoji">🏺</div>
      <div class="track-info">
        <div class="track-name" id="trackName">Alexandrie</div>
        <div class="track-sub" id="trackSub">Nappes antiques · Harpe & Vents</div>
      </div>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <div class="theme-row">
      <button class="theme-btn active-theme" onclick="setTheme('alexandrie', this)">🏺 Alexandrie</button>
      <button class="theme-btn" onclick="setTheme('babylone', this)">🌿 Babylone</button>
      <button class="theme-btn" onclick="setTheme('gizeh', this)">🔺 Gizeh</button>
    </div>

    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="45" oninput="setVol(this.value)">
      <span class="vol-icon">🔊</span>
    </div>
  </div>

  <!-- Players -->
  <div class="card">
    <h2>
      👥 Joueurs
      <button onclick="fillAntiquNames()" style="margin-left:auto;font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:none;background:#111318;border:1px solid #2a2d3e;border-radius:8px;color:#94a3b8;padding:0.25rem 0.6rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='#D4AF37';this.style.color='#D4AF37'" onmouseout="this.style.borderColor='#2a2d3e';this.style.color='#94a3b8'">
        ✨ Noms antiques
      </button>
    </h2>
    <div id="playerList"></div>
    <button class="btn-add" id="addBtn" onclick="addPlayer()">+ Ajouter un joueur</button>
  </div>

  <!-- Options -->
  <div class="card">
    <h2>⚙️ Options</h2>

    <div class="option-row">
      <div>
        <div class="option-label">Extension "Médailles"</div>
        <div class="option-sub">Ajoute Rome &amp; Ur → 9 merveilles disponibles</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="optMedals" onchange="onOptionChange()" />
        <span class="toggle-slider"></span>
      </label>
    </div>

  </div>

  <div id="errorBox" class="error hidden"></div>

  <button class="btn-main" onclick="distribute()">🎲 Lancer la Répartition</button>

  <!-- Results -->
  <div id="results" class="hidden">
    <div class="results-header">
      <span class="results-title">✨ Merveilles Attribuées</span>
      <button class="btn-secondary" onclick="distribute()">↺ Relancer</button>
    </div>
    <div id="resultCards"></div>
  </div>

  <script>
    const WONDERS = [
      { name: 'Gizeh',        emoji: '🔺', power: 'Pas de pouvoir spécial, mais rapporte 8 points de victoire à son étape finale.' },
      { name: 'Alexandrie',   emoji: '💡', power: 'Piochez la 1ère carte d\'une pioche de votre choix (gauche, droite ou centre).' },
      { name: 'Éphèse',       emoji: '🏛️', power: 'Prenez gratuitement la 1ère carte de la pioche centrale.' },
      { name: 'Olympie',      emoji: '⚡', power: 'Prenez gratuitement un jeton Progrès parmi les trois disponibles.' },
      { name: 'Babylone',     emoji: '🌿', power: 'Choisissez un symbole scientifique de votre choix lors du décompte final.' },
      { name: 'Rhodes',       emoji: '⚔️', power: 'Ajoutez définitivement 1 Bouclier à votre force militaire.' },
      { name: 'Halicarnasse', emoji: '🦁', power: 'Fouillez la défausse et jouez une carte gratuitement.' },
    ];

    const MEDALS = [
      { name: 'Rome', emoji: '🏟️', power: 'Piochez 3 jetons Progrès cachés et gardez-en un. Bonus pour les cartes militaires spéciales.' },
      { name: 'Ur',   emoji: '🌀', power: 'Obtenez le jeton Progrès Urbanisme (si dispo) ou des jetons de commerce exclusifs.' },
    ];

    const ANTIQUE_NAMES = [
      'Jules César', 'Cléopâtre', 'Périclès', 'Nabuchodonosor', 'Alexandre',
      'Artémise', 'Hammurabi', 'Sémiramis', 'Khéops', 'Phidias',
      'Hérodote', 'Ptolémée', 'Néron', 'Ramsès II', 'Xerxès',
      'Hannibal', 'Scipion', 'Darius', 'Cyrus', 'Nefertiti'
    ];

    let players = ['Joueur 1', 'Joueur 2', 'Joueur 3'];

    function pool() {
      return document.getElementById('optMedals').checked ? [...WONDERS, ...MEDALS] : [...WONDERS];
    }

    function maxAllowed() {
      return pool().length;
    }

    function fillAntiquNames() {
      const shuffled = [...ANTIQUE_NAMES].sort(() => Math.random() - 0.5);
      players = players.map((_, i) => shuffled[i]);
      render();
    }

    function render() {
      const list = document.getElementById('playerList');
      list.innerHTML = '';
      players.forEach((name, i) => {
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
          <div class="player-num">${i + 1}</div>
          <input type="text" value="${name}" placeholder="Nom du joueur"
            oninput="players[${i}] = this.value" />
          <button class="btn-icon" onclick="removePlayer(${i})"
            ${players.length <= 2 ? 'disabled' : ''} title="Supprimer">✕</button>`;
        list.appendChild(row);
      });

      const max = maxAllowed();
      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = players.length >= max;
      addBtn.textContent = players.length >= max
        ? `Maximum atteint (${max} joueurs)`
        : '+ Ajouter un joueur';
    }

    function addPlayer() {
      if (players.length < maxAllowed()) {
        players.push(`Joueur ${players.length + 1}`);
        render();
      }
    }

    function removePlayer(i) {
      if (players.length > 2) {
        players.splice(i, 1);
        render();
      }
    }

    function onOptionChange() {
      while (players.length > maxAllowed()) players.pop();
      render();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('errorBox').classList.add('hidden');
    }

    function distribute() {
      hideError();
      const p = pool();

      if (p.length < players.length) {
        showError(`Pas assez de merveilles disponibles (${p.length}) pour ${players.length} joueurs. Activez l'extension Médailles ou réduisez le nombre de joueurs.`);
        return;
      }

      const drawn = shuffle(p);
      const cards = document.getElementById('resultCards');
      cards.innerHTML = '';

      players.forEach((name, i) => {
        const playerName = name.trim() || `Joueur ${i + 1}`;
        const w = drawn[i];
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
          <div class="wonder-emoji">${w.emoji}</div>
          <div class="result-info">
            <div class="result-player">${playerName}</div>
            <div class="result-wonder">${w.name}</div>
            <div class="result-power">${w.power}</div>
          </div>`;
        cards.appendChild(card);
      });

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Audio Engine ──────────────────────────────────────
    // Chord progressions + structured melody + arpèges + reverb + compresseur

    const THEMES = {
      alexandrie: {
        name: 'Alexandrie', sub: 'Mystères d\'Égypte · Nappes & Harpe', emoji: '🏺',
        bpm: 56, bpc: 8,
        // Am – F – C – G
        ch: [
          { b: 55.00, p: [110.00, 130.81, 164.81] },
          { b: 87.31, p: [ 87.31, 110.00, 130.81] },
          { b: 65.41, p: [130.81, 164.81, 196.00] },
          { b: 98.00, p: [ 98.00, 123.47, 146.83] },
        ],
        sc: [220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25],
        ar: [0, 1, 2, 1, 0, 2, 1, 0],
        ml: [0, -1,  2, -1,  1,  3, -1,  2,  4, -1,  3,  1, -1,  2, -1,  0],
      },
      babylone: {
        name: 'Babylone', sub: 'Orient Mystique · Gamme Phrygienne', emoji: '🌿',
        bpm: 63, bpc: 8,
        // Dm – Bb – F – A
        ch: [
          { b: 73.42, p: [146.83, 174.61, 220.00] },
          { b: 58.27, p: [116.54, 146.83, 174.61] },
          { b: 87.31, p: [174.61, 220.00, 261.63] },
          { b: 55.00, p: [110.00, 138.59, 164.81] },
        ],
        sc: [293.66, 311.13, 369.99, 392.00, 440.00, 466.16, 554.37],
        ar: [0, 2, 1, 2, 0, 1, 2, 0],
        ml: [0,  1, -1,  2, -1,  3,  1, -1,  4, -1,  3,  2, -1,  1, -1,  0],
      },
      gizeh: {
        name: 'Gizeh', sub: 'Épopée des Pyramides · Cors & Cordes', emoji: '🔺',
        bpm: 70, bpc: 8,
        // G – C – Em – D
        ch: [
          { b: 49.00, p: [ 98.00, 123.47, 146.83] },
          { b: 65.41, p: [130.81, 164.81, 196.00] },
          { b: 82.41, p: [ 82.41,  98.00, 123.47] },
          { b: 73.42, p: [ 73.42,  92.50, 110.00] },
        ],
        sc: [196.00, 220.00, 246.94, 293.66, 329.63, 392.00, 440.00],
        ar: [0, 1, 2, 1, 2, 0, 1, 2],
        ml: [2, -1,  4,  3, -1,  5,  4, -1,  3,  4, -1,  2,  1, -1,  2, -1],
      }
    };

    let actx = null, master = null, rev = null;
    let playing = false, currentTheme = 'alexandrie';
    let schedTimer = null, nextTime = 0, beat = 0;
    let livePad = [], liveBass = [];
    const LOOK = 0.15, TICK = 50;

    function initCtx() {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();
      master = actx.createGain();
      master.gain.value = document.getElementById('volSlider').value / 100 * 0.55;

      // Compressor prevents clipping when layers stack
      const comp = actx.createDynamicsCompressor();
      comp.threshold.value = -14; comp.ratio.value = 5;
      comp.attack.value = 0.005;  comp.release.value = 0.25;
      master.connect(comp); comp.connect(actx.destination);

      // 2-tap reverb with LP filter + feedback
      rev = actx.createGain();
      const d1 = actx.createDelay(2.0), d2 = actx.createDelay(1.0);
      d1.delayTime.value = 0.41; d2.delayTime.value = 0.13;
      const fb1 = actx.createGain(), fb2 = actx.createGain();
      fb1.gain.value = 0.46; fb2.gain.value = 0.29;
      const lp = actx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2200;
      const ro = actx.createGain(); ro.gain.value = 0.38;
      rev.connect(d1); rev.connect(d2);
      d1.connect(lp); d2.connect(lp);
      lp.connect(fb1); lp.connect(fb2); lp.connect(ro);
      fb1.connect(d1); fb2.connect(d2);
      ro.connect(master);
    }

    // Create oscillator + gain node, route direct + reverb send
    function note(freq, type, det, at, stopAt, peak, atk, hold, rel, revR, expDecay) {
      const o = actx.createOscillator();
      o.type = type; o.frequency.value = freq; o.detune.value = det || 0;
      const g  = actx.createGain(); g.gain.value = 0.0001;
      const rg = actx.createGain(); rg.gain.value = revR || 0;
      o.connect(g);
      g.connect(master); // direct
      g.connect(rg); rg.connect(rev); // reverb send (follows g's envelope)
      o.start(at); if (stopAt) o.stop(stopAt);
      g.gain.setValueAtTime(0.0001, at);
      g.gain.linearRampToValueAtTime(peak, at + atk);
      if (hold > 0) g.gain.setValueAtTime(peak, at + atk + hold);
      const end = at + atk + hold + rel;
      expDecay
        ? g.gain.exponentialRampToValueAtTime(0.0001, end)
        : g.gain.linearRampToValueAtTime(0.0001, end);
      return { o, g };
    }

    function kill(list, at, fade) {
      list.forEach(({ o, g }) => {
        try {
          g.gain.cancelScheduledValues(at);
          g.gain.setValueAtTime(g.gain.value, at);
          g.gain.linearRampToValueAtTime(0.0001, at + fade);
          o.stop(at + fade + 0.1);
        } catch(e) {}
      });
    }

    function playPad(ch, at, dur) {
      kill(livePad, at, 1.6); livePad = [];
      ch.p.forEach(f => {
        // 3 detuned voices per chord tone = thick pad
        livePad.push(note(f,     'sine',     0,  at, at+dur+2, 0.055, 2.0, dur-2.5, 1.5, 0.5, false));
        livePad.push(note(f,     'sine',     8,  at, at+dur+2, 0.028, 2.2, dur-2.7, 1.5, 0.5, false));
        livePad.push(note(f,     'triangle',-8,  at, at+dur+2, 0.020, 2.4, dur-2.9, 1.5, 0.4, false));
        livePad.push(note(f * 2, 'sine',     0,  at, at+dur+2, 0.012, 2.8, dur-3.2, 1.5, 0.5, false));
      });
    }

    function playBass(ch, at, dur) {
      kill(liveBass, at, 0.4); liveBass = [];
      liveBass.push(note(ch.b,     'sine', 0, at, at+dur+0.6, 0.17, 0.25, dur-0.5, 0.4, 0.15, false));
      liveBass.push(note(ch.b / 2, 'sine', 0, at, at+dur+0.6, 0.07, 0.30, dur-0.5, 0.4, 0.10, false));
    }

    function playArp(freq, at) {
      // Plucked: fast attack, exponential decay
      note(freq * 2, 'sine',     0, at, at+1.2, 0.055, 0.012, 0, 1.1, 0.5, true);
      note(freq * 2, 'triangle', 6, at, at+0.9, 0.022, 0.008, 0, 0.8, 0.4, true);
    }

    function playMel(freq, at) {
      // Flute-like: soft attack, medium decay, chorus via detuned copy
      note(freq,     'sine', 0,  at, at+1.5, 0.065, 0.04, 0.45, 0.9, 0.5, true);
      note(freq,     'sine', -5, at, at+1.5, 0.028, 0.04, 0.45, 0.9, 0.4, true);
      note(freq * 2, 'sine', 0,  at, at+1.2, 0.010, 0.04, 0.30, 0.8, 0.5, true);
    }

    function sched() {
      const th = THEMES[currentTheme];
      const bd = 60 / th.bpm; // beat duration in seconds

      while (nextTime < actx.currentTime + LOOK) {
        const ci  = Math.floor(beat / th.bpc) % th.ch.length;
        const bic = beat % th.bpc;
        const ch  = th.ch[ci];

        // New chord every th.bpc beats
        if (bic === 0) {
          const cdur = th.bpc * bd;
          playPad(ch, nextTime, cdur);
          playBass(ch, nextTime, cdur);
        }

        // Arpeggio on the beat
        playArp(ch.p[th.ar[bic % th.ar.length]], nextTime);
        // Arp fill on the half-beat (8th note feel)
        playArp(ch.p[th.ar[(bic * 2 + 1) % th.ar.length]], nextTime + bd * 0.5);

        // Melody note every 2 beats, offset by quarter-beat
        if (bic % 2 === 0) {
          const mi = Math.floor(beat / 2) % th.ml.length;
          const si = th.ml[mi];
          if (si >= 0) playMel(th.sc[si % th.sc.length], nextTime + bd * 0.25);
        }

        nextTime += bd;
        beat++;
      }
    }

    function startSynth() {
      beat = 0; nextTime = actx.currentTime + 0.05;
      schedTimer = setInterval(sched, TICK);
    }

    function stopSynth() {
      clearInterval(schedTimer); schedTimer = null;
      const now = actx.currentTime;
      kill(livePad,  now, 1.2); livePad  = [];
      kill(liveBass, now, 0.6); liveBass = [];
    }

    function togglePlay() {
      initCtx();
      if (actx.state === 'suspended') actx.resume();
      playing = !playing;
      const btn = document.getElementById('playBtn');
      const eq  = document.getElementById('eq');
      const dot = document.getElementById('dot');
      if (playing) {
        startSynth();
        btn.textContent = '⏸';
        eq.classList.add('active');
        dot.classList.add('active');
      } else {
        stopSynth();
        btn.textContent = '▶';
        eq.classList.remove('active');
        dot.classList.remove('active');
      }
    }

    function setTheme(key, btn) {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
      btn.classList.add('active-theme');
      currentTheme = key;
      const th = THEMES[key];
      document.getElementById('trackName').textContent  = th.name;
      document.getElementById('trackSub').textContent   = th.sub;
      document.getElementById('trackEmoji').textContent = th.emoji;
      if (playing) { stopSynth(); beat = 0; nextTime = actx.currentTime + 0.1; startSynth(); }
    }

    function setVol(v) {
      if (master) master.gain.value = v / 100 * 0.55;
    }
    // ── End Audio Engine ──────────────────────────────────

    render();
  </script>
</body>
</html>
