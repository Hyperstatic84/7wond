<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7 Wonders Architects – Répartition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111318;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #D4AF37;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Player rows */
    #playerList {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-num {
      width: 28px;
      height: 28px;
      background: #111318;
      border: 1px solid #D4AF37;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .player-row input {
      flex: 1;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-row input:focus { border-color: #D4AF37; }

    .btn-icon {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
    }

    .btn-icon:hover:not(:disabled) { color: #ef4444; background: #ef444415; }
    .btn-icon:disabled { opacity: 0.2; cursor: default; }

    .btn-add {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px dashed #2a2d3e;
      border-radius: 10px;
      color: #64748b;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-add:hover:not(:disabled) { border-color: #D4AF37; color: #D4AF37; }
    .btn-add:disabled { opacity: 0.3; cursor: default; }

    /* Options */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: #111318;
      border-radius: 10px;
      margin-bottom: 0.6rem;
    }

    .option-label { font-size: 0.82rem; }
    .option-sub   { font-size: 0.7rem; color: #64748b; margin-top: 0.1rem; }

    /* Toggle switch */
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #2a2d3e;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #94a3b8;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #8B6508; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #D4AF37; }

    /* Main CTA */
    .btn-main {
      width: 100%;
      max-width: 520px;
      padding: 1rem;
      background: linear-gradient(135deg, #8B6508, #D4AF37);
      border: none;
      border-radius: 14px;
      color: #111318;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 2rem;
    }

    .btn-main:hover  { opacity: 0.92; }
    .btn-main:active { transform: scale(0.98); }

    /* Results */
    #results { width: 100%; max-width: 520px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .results-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn-secondary {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: #D4AF37; color: #D4AF37; }

    #resultCards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .result-card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wonder-emoji {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      background: #111318;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #2a2d3e;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-player {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }

    .result-wonder {
      font-size: 1rem;
      font-weight: 800;
      color: #D4AF37;
      margin-bottom: 0.3rem;
    }

    .result-power {
      font-size: 0.72rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Error */
    .error {
      background: #1f0b0b;
      border: 1px solid #ef444440;
      color: #fca5a5;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      max-width: 520px;
      width: 100%;
    }

    .hidden { display: none !important; }

    /* ── Music Player ── */
    .player-card {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .player-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #D4AF37;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot-pulse {
      width: 7px; height: 7px;
      background: #D4AF37;
      border-radius: 50%;
    }
    .dot-pulse.active { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* Equalizer bars */
    .eq {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }
    .eq span {
      display: block;
      width: 3px;
      background: #D4AF37;
      border-radius: 2px;
      height: 3px;
      transition: height 0.1s;
    }
    .eq.active span:nth-child(1) { animation: bar 1.1s 0.0s ease-in-out infinite alternate; }
    .eq.active span:nth-child(2) { animation: bar 1.1s 0.3s ease-in-out infinite alternate; }
    .eq.active span:nth-child(3) { animation: bar 1.1s 0.15s ease-in-out infinite alternate; }
    .eq.active span:nth-child(4) { animation: bar 1.1s 0.45s ease-in-out infinite alternate; }
    .eq.active span:nth-child(5) { animation: bar 1.1s 0.25s ease-in-out infinite alternate; }
    @keyframes bar {
      from { height: 3px; }
      to   { height: 18px; }
    }

    .player-body {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.9rem;
    }

    .track-emoji {
      font-size: 1.6rem;
      width: 42px; height: 42px;
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 0.85rem; font-weight: 700; color: #e2e8f0; }
    .track-sub  { font-size: 0.68rem; color: #64748b; margin-top: 0.1rem; }

    .play-btn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #8B6508, #D4AF37);
      border: none; border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    .play-btn:hover  { opacity: 0.88; }
    .play-btn:active { transform: scale(0.93); }

    .theme-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .theme-btn {
      flex: 1;
      background: #111318;
      border: 1px solid #2a2d3e;
      border-radius: 9px;
      color: #64748b;
      font-size: 0.72rem;
      padding: 0.4rem 0.3rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: center;
    }
    .theme-btn:hover        { border-color: #D4AF3770; color: #D4AF37; }
    .theme-btn.active-theme { border-color: #D4AF37; color: #D4AF37; background: #D4AF3712; }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .vol-icon { font-size: 0.9rem; color: #475569; flex-shrink: 0; }
    input[type=range].vol {
      flex: 1;
      accent-color: #D4AF37;
      height: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>7 WONDERS ARCHITECTS</h1>
  <p class="subtitle">Répartition des Merveilles</p>

  <!-- Music Player -->
  <div class="player-card">
    <div class="player-top">
      <div class="player-label">
        <div class="dot-pulse" id="dot"></div>
        Ambiance Sonore
      </div>
      <div class="eq" id="eq">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="player-body">
      <div class="track-emoji" id="trackEmoji">🏺</div>
      <div class="track-info">
        <div class="track-name" id="trackName">Alexandrie</div>
        <div class="track-sub" id="trackSub">Drones & Bols Chantants · Égypte Mystique</div>
      </div>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <div class="theme-row">
      <button class="theme-btn active-theme" onclick="setTheme('alexandrie', this)">🏺 Alexandrie</button>
      <button class="theme-btn" onclick="setTheme('babylone', this)">🌿 Babylone</button>
      <button class="theme-btn" onclick="setTheme('gizeh', this)">🔺 Gizeh</button>
    </div>

    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="45" oninput="setVol(this.value)">
      <span class="vol-icon">🔊</span>
    </div>
  </div>

  <!-- Players -->
  <div class="card">
    <h2>
      👥 Joueurs
      <button onclick="fillAntiquNames()" style="margin-left:auto;font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:none;background:#111318;border:1px solid #2a2d3e;border-radius:8px;color:#94a3b8;padding:0.25rem 0.6rem;cursor:pointer;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='#D4AF37';this.style.color='#D4AF37'" onmouseout="this.style.borderColor='#2a2d3e';this.style.color='#94a3b8'">
        ✨ Noms antiques
      </button>
    </h2>
    <div id="playerList"></div>
    <button class="btn-add" id="addBtn" onclick="addPlayer()">+ Ajouter un joueur</button>
  </div>

  <!-- Options -->
  <div class="card">
    <h2>⚙️ Options</h2>

    <div class="option-row">
      <div>
        <div class="option-label">Extension "Médailles"</div>
        <div class="option-sub">Ajoute Rome &amp; Ur → 9 merveilles disponibles</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="optMedals" onchange="onOptionChange()" />
        <span class="toggle-slider"></span>
      </label>
    </div>

  </div>

  <div id="errorBox" class="error hidden"></div>

  <button class="btn-main" onclick="distribute()">🎲 Lancer la Répartition</button>

  <!-- Results -->
  <div id="results" class="hidden">
    <div class="results-header">
      <span class="results-title">✨ Merveilles Attribuées</span>
      <button class="btn-secondary" onclick="distribute()">↺ Relancer</button>
    </div>
    <div id="resultCards"></div>
  </div>

  <script>
    const WONDERS = [
      { name: 'Gizeh',        emoji: '🔺', power: 'Pas de pouvoir spécial, mais rapporte 8 points de victoire à son étape finale.' },
      { name: 'Alexandrie',   emoji: '💡', power: 'Piochez la 1ère carte d\'une pioche de votre choix (gauche, droite ou centre).' },
      { name: 'Éphèse',       emoji: '🏛️', power: 'Prenez gratuitement la 1ère carte de la pioche centrale.' },
      { name: 'Olympie',      emoji: '⚡', power: 'Prenez gratuitement un jeton Progrès parmi les trois disponibles.' },
      { name: 'Babylone',     emoji: '🌿', power: 'Choisissez un symbole scientifique de votre choix lors du décompte final.' },
      { name: 'Rhodes',       emoji: '⚔️', power: 'Ajoutez définitivement 1 Bouclier à votre force militaire.' },
      { name: 'Halicarnasse', emoji: '🦁', power: 'Fouillez la défausse et jouez une carte gratuitement.' },
    ];

    const MEDALS = [
      { name: 'Rome', emoji: '🏟️', power: 'Piochez 3 jetons Progrès cachés et gardez-en un. Bonus pour les cartes militaires spéciales.' },
      { name: 'Ur',   emoji: '🌀', power: 'Obtenez le jeton Progrès Urbanisme (si dispo) ou des jetons de commerce exclusifs.' },
    ];

    const ANTIQUE_NAMES = [
      'Jules César', 'Cléopâtre', 'Périclès', 'Nabuchodonosor', 'Alexandre',
      'Artémise', 'Hammurabi', 'Sémiramis', 'Khéops', 'Phidias',
      'Hérodote', 'Ptolémée', 'Néron', 'Ramsès II', 'Xerxès',
      'Hannibal', 'Scipion', 'Darius', 'Cyrus', 'Nefertiti'
    ];

    let players = ['Joueur 1', 'Joueur 2', 'Joueur 3'];

    function pool() {
      return document.getElementById('optMedals').checked ? [...WONDERS, ...MEDALS] : [...WONDERS];
    }

    function maxAllowed() {
      return pool().length;
    }

    function fillAntiquNames() {
      const shuffled = [...ANTIQUE_NAMES].sort(() => Math.random() - 0.5);
      players = players.map((_, i) => shuffled[i]);
      render();
    }

    function render() {
      const list = document.getElementById('playerList');
      list.innerHTML = '';
      players.forEach((name, i) => {
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
          <div class="player-num">${i + 1}</div>
          <input type="text" value="${name}" placeholder="Nom du joueur"
            oninput="players[${i}] = this.value" />
          <button class="btn-icon" onclick="removePlayer(${i})"
            ${players.length <= 2 ? 'disabled' : ''} title="Supprimer">✕</button>`;
        list.appendChild(row);
      });

      const max = maxAllowed();
      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = players.length >= max;
      addBtn.textContent = players.length >= max
        ? `Maximum atteint (${max} joueurs)`
        : '+ Ajouter un joueur';
    }

    function addPlayer() {
      if (players.length < maxAllowed()) {
        players.push(`Joueur ${players.length + 1}`);
        render();
      }
    }

    function removePlayer(i) {
      if (players.length > 2) {
        players.splice(i, 1);
        render();
      }
    }

    function onOptionChange() {
      while (players.length > maxAllowed()) players.pop();
      render();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('errorBox').classList.add('hidden');
    }

    function distribute() {
      hideError();
      const p = pool();

      if (p.length < players.length) {
        showError(`Pas assez de merveilles disponibles (${p.length}) pour ${players.length} joueurs. Activez l'extension Médailles ou réduisez le nombre de joueurs.`);
        return;
      }

      const drawn = shuffle(p);
      const cards = document.getElementById('resultCards');
      cards.innerHTML = '';

      players.forEach((name, i) => {
        const playerName = name.trim() || `Joueur ${i + 1}`;
        const w = drawn[i];
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
          <div class="wonder-emoji">${w.emoji}</div>
          <div class="result-info">
            <div class="result-player">${playerName}</div>
            <div class="result-wonder">${w.name}</div>
            <div class="result-power">${w.power}</div>
          </div>`;
        cards.appendChild(card);
      });

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Audio Engine — Drones / Vent / Bols Chantants ────────
    // No rhythm, no melody — pure textural ambiance

    const THEMES = {
      alexandrie: {
        name: 'Alexandrie', sub: 'Drones & Bols Chantants · Égypte Mystique', emoji: '🏺',
        drones: [
          { f: 55.00, v: 0.14 }, { f: 110.00, v: 0.11 }, { f: 164.81, v: 0.07 },
          { f: 220.00, v: 0.04 }, { f: 261.63, v: 0.025 },
        ],
        bowls: [220.00, 164.81, 329.63, 261.63],
        windFreq: 360, windQ: 3.2, windVol: 0.032,
        pad: [440.00, 329.63, 523.25],
      },
      babylone: {
        name: 'Babylone', sub: 'Résonances Orientales · Modes Antiques', emoji: '🌿',
        drones: [
          { f: 73.42, v: 0.14 }, { f: 146.83, v: 0.10 }, { f: 110.00, v: 0.07 },
          { f: 174.61, v: 0.045 }, { f: 220.00, v: 0.03 },
        ],
        bowls: [146.83, 110.00, 220.00, 174.61],
        windFreq: 480, windQ: 4.5, windVol: 0.028,
        pad: [293.66, 369.99, 440.00],
      },
      gizeh: {
        name: 'Gizeh', sub: 'Éternité de Pierre · Harmoniques Épiques', emoji: '🔺',
        drones: [
          { f: 49.00, v: 0.15 }, { f: 98.00, v: 0.12 }, { f: 146.83, v: 0.08 },
          { f: 196.00, v: 0.05 }, { f: 246.94, v: 0.03 },
        ],
        bowls: [196.00, 146.83, 392.00, 246.94],
        windFreq: 680, windQ: 2.8, windVol: 0.038,
        pad: [392.00, 493.88, 587.33],
      }
    };

    let actx = null, master = null, rev = null;
    let playing = false, currentTheme = 'alexandrie';
    let allOscs = [], allLfos = [], allGains = [];
    let windSrc = null, bowlTimer = null;

    function initCtx() {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();
      master = actx.createGain();
      master.gain.value = document.getElementById('volSlider').value / 100 * 0.6;

      const comp = actx.createDynamicsCompressor();
      comp.threshold.value = -12; comp.ratio.value = 4;
      comp.attack.value = 0.01; comp.release.value = 0.4;
      master.connect(comp); comp.connect(actx.destination);

      // Long reverb: 2 delay taps with LP feedback
      rev = actx.createGain();
      const d1 = actx.createDelay(3.0), d2 = actx.createDelay(2.0);
      d1.delayTime.value = 0.73; d2.delayTime.value = 0.47;
      const fb1 = actx.createGain(), fb2 = actx.createGain();
      fb1.gain.value = 0.52; fb2.gain.value = 0.38;
      const lp = actx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 1800;
      const ro = actx.createGain(); ro.gain.value = 0.42;
      rev.connect(d1); rev.connect(d2);
      d1.connect(lp); d2.connect(lp);
      lp.connect(fb1); lp.connect(fb2); lp.connect(ro);
      fb1.connect(d1); fb2.connect(d2);
      ro.connect(master);
    }

    function route(osc, g, revAmt) {
      const rg = actx.createGain(); rg.gain.value = revAmt;
      osc.connect(g); g.connect(master); g.connect(rg); rg.connect(rev);
      allOscs.push(osc); allGains.push(g);
    }

    function makeLfo(rate, depth, target) {
      const lfo = actx.createOscillator();
      const lg  = actx.createGain();
      lfo.frequency.value = rate; lg.gain.value = depth;
      lfo.connect(lg); lg.connect(target);
      lfo.start(); allLfos.push(lfo);
      return lfo;
    }

    function startDrones(th) {
      th.drones.forEach(({ f, v }) => {
        [-2, 0, 2].forEach((cents, i) => {
          const o = actx.createOscillator();
          o.type = 'sine'; o.frequency.value = f; o.detune.value = cents;
          const g = actx.createGain(); g.gain.value = 0.0001;
          route(o, g, 0.55);
          o.start();
          g.gain.linearRampToValueAtTime(v * (i === 1 ? 1 : 0.55), actx.currentTime + 4.5);
          // Each voice gets its own slow LFO for organic beating
          const lfoRate = 0.04 + i * 0.023 + Math.random() * 0.015;
          makeLfo(lfoRate, f * 0.003, o.frequency);
        });
      });
    }

    function startWind(th) {
      const bufSec = 2;
      const buf = actx.createBuffer(1, actx.sampleRate * bufSec, actx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

      windSrc = actx.createBufferSource();
      windSrc.buffer = buf; windSrc.loop = true;

      const bpf = actx.createBiquadFilter();
      bpf.type = 'bandpass'; bpf.frequency.value = th.windFreq; bpf.Q.value = th.windQ;

      const lpf = actx.createBiquadFilter();
      lpf.type = 'lowpass'; lpf.frequency.value = 800;

      const wg = actx.createGain(); wg.gain.value = 0.0001;

      windSrc.connect(bpf); bpf.connect(lpf); lpf.connect(wg);
      wg.connect(master); wg.connect(rev);

      windSrc.start();
      wg.gain.linearRampToValueAtTime(th.windVol, actx.currentTime + 5.0);

      // Very slow LFO on filter freq for breathing wind texture
      makeLfo(0.04, th.windFreq * 0.18, bpf.frequency);
      allGains.push(wg);
    }

    function startPad(th) {
      th.pad.forEach((f, i) => {
        const o = actx.createOscillator();
        o.type = 'sine'; o.frequency.value = f;
        const g = actx.createGain(); g.gain.value = 0.0001;
        route(o, g, 0.7);
        o.start();
        g.gain.linearRampToValueAtTime(0.018 - i * 0.004, actx.currentTime + 7.0);
        // Shimmer: fast LFO on gain
        makeLfo(0.08 + i * 0.031, 0.006, g.gain);
      });
    }

    function playBowl(freq) {
      if (!actx || !playing) return;
      const now = actx.currentTime;
      const dur = 8.0;

      // FM synthesis: inharmonic ratio gives bell/bowl timbre
      const mod = actx.createOscillator();
      const modG = actx.createGain();
      mod.frequency.value = freq * 2.756;
      modG.gain.setValueAtTime(freq * 5.5, now);
      modG.gain.exponentialRampToValueAtTime(freq * 0.04, now + dur);
      mod.connect(modG); modG.connect(/* carrier freq param below */null);

      const car = actx.createOscillator();
      car.frequency.value = freq;
      modG.connect(car.frequency); // FM modulation

      const eg = actx.createGain();
      eg.gain.setValueAtTime(0.0001, now);
      eg.gain.linearRampToValueAtTime(0.22, now + 0.012);
      eg.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      const rg = actx.createGain(); rg.gain.value = 0.8;
      car.connect(eg); eg.connect(master); eg.connect(rg); rg.connect(rev);

      mod.start(now); mod.stop(now + dur + 0.1);
      car.start(now); car.stop(now + dur + 0.1);
    }

    function scheduleBowls() {
      if (!playing) return;
      const th = THEMES[currentTheme];
      const freq = th.bowls[Math.floor(Math.random() * th.bowls.length)];
      playBowl(freq);
      const next = 4000 + Math.random() * 8000;
      bowlTimer = setTimeout(scheduleBowls, next);
    }

    function startAudio() {
      allOscs = []; allLfos = []; allGains = []; windSrc = null;
      const th = THEMES[currentTheme];
      startDrones(th);
      startWind(th);
      startPad(th);
      bowlTimer = setTimeout(scheduleBowls, 1500 + Math.random() * 3000);
    }

    function stopAudio() {
      clearTimeout(bowlTimer); bowlTimer = null;
      if (windSrc) { try { windSrc.stop(); } catch(e) {} windSrc = null; }
      const now = actx.currentTime;
      allGains.forEach(g => {
        try {
          g.gain.cancelScheduledValues(now);
          g.gain.setValueAtTime(g.gain.value, now);
          g.gain.linearRampToValueAtTime(0.0001, now + 1.6);
        } catch(e) {}
      });
      const oscs = [...allOscs, ...allLfos];
      setTimeout(() => {
        oscs.forEach(o => { try { o.stop(); } catch(e) {} });
        allOscs = []; allLfos = []; allGains = [];
      }, 1700);
    }

    function togglePlay() {
      initCtx();
      if (actx.state === 'suspended') actx.resume();
      playing = !playing;
      const btn = document.getElementById('playBtn');
      const eq  = document.getElementById('eq');
      const dot = document.getElementById('dot');
      if (playing) {
        startAudio();
        btn.textContent = '⏸';
        eq.classList.add('active');
        dot.classList.add('active');
      } else {
        stopAudio();
        btn.textContent = '▶';
        eq.classList.remove('active');
        dot.classList.remove('active');
      }
    }

    function setTheme(key, btn) {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
      btn.classList.add('active-theme');
      currentTheme = key;
      const th = THEMES[key];
      document.getElementById('trackName').textContent  = th.name;
      document.getElementById('trackSub').textContent   = th.sub;
      document.getElementById('trackEmoji').textContent = th.emoji;
      if (playing) { stopAudio(); playing = false; setTimeout(() => { playing = true; startAudio(); }, 1800); }
    }

    function setVol(v) {
      if (master) master.gain.value = v / 100 * 0.6;
    }
    // ── End Audio Engine ──────────────────────────────────

    render();
  </script>
</body>
</html>
